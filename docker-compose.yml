services:
  # SHARED INFRA
  redis:
    image: redis:7-alpine
    container_name: iicpc_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: iicpc_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password_123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  postgres:
    image: postgres:15-alpine
    container_name: iicpc_postgres
    restart: always
    environment:
      POSTGRES_USER: hackathon_admin
      POSTGRES_PASSWORD: super_secure_password_123
      POSTGRES_DB: iicpc_telemetry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # SANDBOX ENGINE
  sandbox-api:
    build:
      context: ./sandbox-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio_admin
      - MINIO_SECRET_KEY=minio_password_123
    depends_on:
      - redis
      - minio
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  sandbox-runner:
    build:
      context: ./sandbox-engine
      dockerfile: Dockerfile.runner
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio_admin
      - MINIO_SECRET_KEY=minio_password_123
    depends_on:
      - redis
      - minio
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # BOT FLEET
  mock-engine:
    build:
      context: ./bot-fleet
      dockerfile: Dockerfile
    container_name: iicpc_mock_engine
    command: uvicorn mock_engine:app --host 0.0.0.0 --port 9100 --workers 4
    ports:
      - "9100:9100"
    restart: unless-stopped

  bot-fleet:
    build:
      context: ./bot-fleet
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - TARGET=http://mock-engine:9100
      - TEAM_ID=1
      - N_BOTS=500
      - DURATION=30
      - RAMP_UP=5
      - THINK_MS=0
    depends_on:
      - redis
      - mock-engine

  # LEADERBOARD & TELEMETRY 
  leaderboard-api:
    image: python:3.10-slim
    container_name: iicpc_leaderboard_api
    restart: always
    volumes:
      - ./leaderboard:/app
    working_dir: /app
    ports:
      - "8080:8000"
    depends_on:
      - postgres
      - redis
    environment:
      - DB_DSN=postgres://hackathon_admin:super_secure_password_123@postgres:5432/iicpc_telemetry
      - REDIS_URL=redis://redis:6379/0
    command: >
      bash -c "pip install -r req.txt && 
               uvicorn api:app --host 0.0.0.0 --port 8000 --reload"

  leaderboard-frontend:
    image: node:18-alpine
    container_name: iicpc_react
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    ports:
      - "3000:3000"
    depends_on:
      - leaderboard-api
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
    command: >
      sh -c "npm install && npm start"

volumes:
  minio_data:
  postgres_data:
  redis_data: