version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: iicpc_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: iicpc_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password_123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  sandbox-api:
    build:
      context: ./sandbox-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio_admin
      - MINIO_SECRET_KEY=minio_password_123
    depends_on:
      - redis
      - minio
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  sandbox-runner:
    build:
      context: ./sandbox-engine
      dockerfile: Dockerfile.runner
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio_admin
      - MINIO_SECRET_KEY=minio_password_123
    depends_on:
      - redis
      - minio
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  postgres:
    image: postgres:15-alpine
    container_name: iicpc_postgres
    restart: always
    environment:
      POSTGRES_USER: hackathon_admin
      POSTGRES_PASSWORD: super_secure_password_123
      POSTGRES_DB: iicpc_telemetry
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  minio_data:
  postgres_data:
  redis_data: